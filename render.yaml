services:
  - type: web
    name: extractiq-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_ENDPOINT
        sync: false
      - key: UPSTASH_REDIS_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: worker
    name: extractiq-celery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_app.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_ENDPOINT
        sync: false
      - key: UPSTASH_REDIS_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false